name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t guestbook .

      - name: Smoke test - app imports cleanly
        run: docker run --rm guestbook python -c "import app; print('app imports OK')"
